<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Flow – Social Timeline</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>Social Timeline</h1>

    <!-- EVENTS live here: inputs and the submit button -->
    <section class="form-section">
      <input type="text" id="nameInput" placeholder="Your name">
      <input type="text" id="textInput" placeholder="What's on your mind?">
      <button type="button" id="submitBtn">Add Post</button>
    </section>

    <!-- RENDER() writes every post into this element -->
    <section id="timeline"></section>

  </div>

  <script src="main.js"></script>
</body>
</html>
