<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Exercise 2</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="page">
      <h1>Exercise 2</h1>

      <section class="row equal-row">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
      </section>

      <section class="row grow-row">
        <div class="box small">1</div>
        <div class="box wide">2</div>
        <div class="box wide">3</div>
      </section>
    </main>
  </body>
</html>
