<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 2 - My Bookmarks</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <h1>My Bookmarks</h1>

    <section class="bookmarks">
      <a class="bookmark-card news-card" href="https://www.ynet.co.il" target="_blank">
        <h2>News</h2>
        <p>Visit Ynet for news updates.</p>
      </a>

      <a class="bookmark-card youtube-card" href="https://www.youtube.com" target="_blank">
        <h2>YouTube</h2>
        <p>Watch videos and channels.</p>
      </a>

      <a class="bookmark-card facebook-card" href="https://www.facebook.com" target="_blank">
        <h2>Facebook</h2>
        <p>Open Facebook in a new tab.</p>
      </a>
    </section>
  </main>
</body>
</html>
