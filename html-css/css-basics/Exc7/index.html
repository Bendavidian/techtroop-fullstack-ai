<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 7 - Background Image</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="hero">
    <div class="title-box transparent-box">
      <h1>Transparent Title</h1>
      <p>The image is still visible behind this box.</p>
    </div>

    <div class="title-box solid-box">
      <h2>Solid Title Box</h2>
      <p>This box completely hides the image underneath.</p>
    </div>
  </main>
</body>
</html>
