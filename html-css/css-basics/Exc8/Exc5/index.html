<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form - Ben Davidian</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="page">
      <h1>Contact Ben Davidian</h1>
      <p>
        Use this form to contact Ben Davidian about web development, AI tools,
        finance, or useful project ideas.
      </p>

      <form>
        <fieldset>
          <legend>Personal Information</legend>

          <p>
            <label for="full-name">Full Name:</label>
            <input
              type="text"
              id="full-name"
              name="full-name"
              placeholder="Enter your full name"
              required
            >
          </p>

          <p>
            <label for="email">Email Address:</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="name@example.com"
              required
            >
          </p>

          <p>
            <label for="phone">Phone Number:</label>
            <input
              type="tel"
              id="phone"
              name="phone"
              placeholder="050-123-4567"
            >
          </p>
        </fieldset>

        <fieldset>
          <legend>Message Details</legend>

          <p>
            <label for="topic">Message Topic:</label>
            <select id="topic" name="topic" required>
              <option value="">Choose a topic</option>
              <option value="web-development">Web Development</option>
              <option value="ai-tools">AI Tools</option>
              <option value="finance">Finance</option>
              <option value="project-idea">Project Idea</option>
            </select>
          </p>

          <p>
            <label for="message">Message:</label>
            <textarea
              id="message"
              name="message"
              placeholder="Write your message here"
              required
            ></textarea>
          </p>
        </fieldset>

        <fieldset>
          <legend>Preferences</legend>

          <p>Preferred Contact Method:</p>
          <p class="choice">
            <input
              type="radio"
              id="contact-email"
              name="contact-method"
              value="email"
              required
            >
            <label for="contact-email">Email</label>
          </p>
          <p class="choice">
            <input
              type="radio"
              id="contact-phone"
              name="contact-method"
              value="phone"
            >
            <label for="contact-phone">Phone</label>
          </p>

          <p class="choice">
            <input
              type="checkbox"
              id="newsletter"
              name="newsletter"
              value="yes"
            >
            <label for="newsletter">
              I would like to receive updates about Ben's projects.
            </label>
          </p>
        </fieldset>

        <p class="actions">
          <button class="submit-button" type="submit">Submit</button>
          <button class="reset-button" type="reset">Reset</button>
        </p>
      </form>
    </main>
  </body>
</html>
