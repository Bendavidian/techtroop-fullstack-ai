<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 3 - Image Bookmarks</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <h1>My Bookmarks</h1>

    <section class="bookmarks">
      <a class="bookmark-link" href="https://www.ynet.co.il" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/Ynet_website_logo.svg/320px-Ynet_website_logo.svg.png" alt="Ynet logo">
      </a>

      <a class="bookmark-link" href="https://www.youtube.com" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/09/YouTube_full-color_icon_%282017%29.svg/320px-YouTube_full-color_icon_%282017%29.svg.png" alt="YouTube logo">
      </a>

      <a class="bookmark-link" href="https://www.facebook.com" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b9/2023_Facebook_icon.svg/320px-2023_Facebook_icon.svg.png" alt="Facebook logo">
      </a>
    </section>
  </main>
</body>
</html>
