<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Responsive Design - Exercise 5</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="page">
      <article class="product-card">
        <section class="image-panel">
          <span>📷</span>
        </section>
        <section class="product-info">
          <h1>Premium Laptop</h1>
          <p>
            High-performance laptop perfect for developers and designers.
            Features the latest processor, ample RAM, and a stunning display
            that brings your work to life.
          </p>
          <div class="purchase-row">
            <strong>$1,299</strong>
            <button type="button">Add to Cart</button>
          </div>
        </section>
      </article>
    </main>
  </body>
</html>
