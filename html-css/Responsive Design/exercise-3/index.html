<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Responsive Design - Exercise 3</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="page">
      <h1>Responsive Image Gallery</h1>
      <section class="gallery">
        <a class="image-card" href="https://picsum.photos/id/1015/1200/800" target="_blank">
          <img src="https://picsum.photos/id/1015/900/620" alt="Mountain landscape">
          <span>Mountain View</span>
        </a>
        <a class="image-card" href="https://picsum.photos/id/1025/900/1200" target="_blank">
          <img src="https://picsum.photos/id/1025/700/900" alt="Dog portrait">
          <span>Forest Friend</span>
        </a>
        <a class="image-card" href="https://picsum.photos/id/1039/1400/900" target="_blank">
          <img src="https://picsum.photos/id/1039/1000/640" alt="Water landscape">
          <span>Quiet Shore</span>
        </a>
        <a class="image-card" href="https://picsum.photos/id/1043/900/900" target="_blank">
          <img src="https://picsum.photos/id/1043/800/800" alt="City skyline">
          <span>City Lights</span>
        </a>
        <a class="image-card" href="https://picsum.photos/id/1056/1300/850" target="_blank">
          <img src="https://picsum.photos/id/1056/1000/650" alt="Valley landscape">
          <span>Open Valley</span>
        </a>
        <a class="image-card" href="https://picsum.photos/id/1067/850/1200" target="_blank">
          <img src="https://picsum.photos/id/1067/680/980" alt="Nature path">
          <span>Nature Path</span>
        </a>
      </section>
    </main>
  </body>
</html>
